<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1.0" />
  <title>抖音封面 - OpenClaw 小某书配图体验</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,122,89,0.22) 0, rgba(255,122,89,0) 28%),
        radial-gradient(circle at 85% 18%, rgba(255,0,128,0.20) 0, rgba(255,0,128,0) 26%),
        radial-gradient(circle at 50% 82%, rgba(94,92,230,0.20) 0, rgba(94,92,230,0) 30%),
        linear-gradient(160deg, #0b1020 0%, #151b33 45%, #1f1338 100%);
      color: #fff;
    }
    body {
      position: relative;
      padding: 86px 72px;
    }
    .noise, .grid, .glow { position: absolute; inset: 0; pointer-events: none; }
    .grid {
      background-image:
        linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.45), rgba(0,0,0,0.08));
      opacity: 0.35;
    }
    .noise {
      background-image: radial-gradient(rgba(255,255,255,0.12) 0.8px, transparent 0.8px);
      background-size: 12px 12px;
      opacity: 0.08;
      mix-blend-mode: soft-light;
    }
    .glow::before, .glow::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(70px);
      opacity: 0.55;
    }
    .glow::before {
      width: 320px; height: 320px; left: -60px; top: 220px;
      background: rgba(255, 97, 97, 0.36);
    }
    .glow::after {
      width: 360px; height: 360px; right: -80px; bottom: 200px;
      background: rgba(132, 103, 255, 0.34);
    }

    .frame {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 42px;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03));
      box-shadow: 0 30px 120px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
      padding: 56px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      backdrop-filter: blur(12px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 48px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 22px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .tag .dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: linear-gradient(135deg, #ff4d6d, #7a5cff);
      box-shadow: 0 0 20px rgba(255,77,109,0.8);
    }
    .badge {
      font-size: 26px;
      font-weight: 700;
      padding: 12px 18px;
      border-radius: 18px;
      color: #111;
      background: linear-gradient(135deg, #ffd36a, #ff8a5b);
      box-shadow: 0 12px 32px rgba(255,138,91,0.25);
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 34px;
      padding: 12px 0 24px;
    }
    .kicker {
      display: inline-block;
      width: fit-content;
      padding: 12px 18px;
      border-radius: 16px;
      background: rgba(122,92,255,0.16);
      border: 1px solid rgba(159,136,255,0.30);
      color: #d9d1ff;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    h1 {
      font-size: 98px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -2px;
      text-shadow: 0 8px 40px rgba(0,0,0,0.28);
    }
    h1 .accent {
      display: block;
      background: linear-gradient(90deg, #ffffff 0%, #ffd6c8 35%, #ffc66b 65%, #ffffff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .sub {
      font-size: 40px;
      line-height: 1.55;
      color: rgba(255,255,255,0.86);
      max-width: 860px;
      font-weight: 500;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-top: 8px;
    }
    .card {
      min-height: 188px;
      border-radius: 26px;
      padding: 22px 22px 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.05));
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .card .emoji {
      font-size: 42px;
      margin-bottom: 12px;
    }
    .card h3 {
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 800;
    }
    .card p {
      font-size: 22px;
      line-height: 1.45;
      color: rgba(255,255,255,0.78);
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.12);
    }
    .brand {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 0.5px;
    }
    .brand span {
      color: #ffc66b;
    }
    .meta {
      font-size: 28px;
      color: rgba(255,255,255,0.75);
      text-align: right;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="noise"></div>
  <div class="glow"></div>

  <div class="frame">
    <div class="topbar">
      <div class="tag"><span class="dot"></span> AI 配图体验</div>
      <div class="badge">抖音封面</div>
    </div>

    <div class="content">
      <div class="kicker">用 OpenClaw 做内容图，到底顺不顺手？</div>
      <h1>
        用OpenClaw快速生成的
        <span class="accent">小某书配图</span>
        是什么样的体验？
      </h1>
      <div class="sub">
        从文案到出图，从提示词到成品效果，看看 AI 工作流做出来的社媒配图到底能不能直接用。
      </div>

      <div class="cards">
        <div class="card">
          <div class="emoji">⚡</div>
          <h3>出图速度</h3>
          <p>流程更快，适合高频内容制作。</p>
        </div>
        <div class="card">
          <div class="emoji">🎨</div>
          <h3>风格一致</h3>
          <p>更容易做成系列化视觉风格。</p>
        </div>
        <div class="card">
          <div class="emoji">📱</div>
          <h3>适合社媒</h3>
          <p>适配小某书封面、配图与信息卡片。</p>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="brand">Open<span>Claw</span> × 内容工作流</div>
      <div class="meta">封面比例 9:16<br/>1080 × 1920</div>
    </div>
  </div>
</body>
</html>
