<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>马自达EZ-60 十大理由 05</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    width: 1080px;
    height: 1440px;
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    background: radial-gradient(1100px 900px at 80% 20%, rgba(255,220,120,0.18), transparent 60%),
                linear-gradient(155deg, #13110a 0%, #1f1a0f 55%, #13110a 100%);
    color: #F7F7F7;
  }
  .canvas { width:100%; height:100%; padding:80px; display:flex; flex-direction:column; justify-content:space-between; }
  .header .title { font-size:52px; font-weight:800; letter-spacing:1px; }
  .header .subtitle { margin-top:10px; font-size:26px; color:#FFD36E; }
  .card { background: rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:28px; padding:36px 40px; margin-top:26px; box-shadow:0 12px 30px rgba(0,0,0,0.35);}  
  .card-title { display:flex; align-items:center; gap:18px; font-size:34px; font-weight:700; }
  .badge { width:54px; height:54px; border-radius:50%; background:#FFC857; display:inline-flex; align-items:center; justify-content:center; font-weight:800; color:#2b2005; }
  ul { margin:18px 0 0 0; padding-left:26px; font-size:26px; line-height:1.5; color:#EDEDED; }
  .cta {
    margin-top: 22px;
    padding: 18px 22px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    border: 1px dashed rgba(255,255,255,0.25);
    font-size: 24px;
    line-height: 1.6;
    color: #FFF2D2;
  }
  .footer { font-size:22px; color:#B6B6B6; text-align:right; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="header">
      <div class="title">选择马自达 EZ-60 的十大理由</div>
      <div class="subtitle">价值与品牌的双重保障</div>
    </div>

    <div>
      <div class="card">
        <div class="card-title"><span class="badge">9</span>价格优势</div>
        <ul>
          <li>同级性价比高</li>
          <li>购车权益丰富</li>
          <li>保养成本低</li>
          <li>保值率可期</li>
        </ul>
      </div>

      <div class="card">
        <div class="card-title"><span class="badge">10</span>品牌信赖</div>
        <ul>
          <li>马自达百年品牌</li>
          <li>全球品质标准</li>
          <li>售后服务完善</li>
          <li>车主口碑好</li>
        </ul>
        <div class="cta">💬 你最心动哪个理由？\n👇 评论区聊聊｜🔖 收藏备用不迷路</div>
      </div>
    </div>

    <div class="footer">#马自达EZ60 #购车指南</div>
  </div>
</body>
</html>
