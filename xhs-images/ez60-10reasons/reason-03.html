<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>马自达EZ-60 十大理由 03</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    width: 1080px;
    height: 1440px;
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    background: radial-gradient(1100px 900px at 80% 10%, rgba(0,200,255,0.18), transparent 60%),
                linear-gradient(155deg, #0a1218 0%, #0f1c2c 55%, #0a1218 100%);
    color: #F7F7F7;
  }
  .canvas { width:100%; height:100%; padding:80px; display:flex; flex-direction:column; justify-content:space-between; }
  .header .title { font-size:52px; font-weight:800; letter-spacing:1px; }
  .header .subtitle { margin-top:10px; font-size:26px; color:#8DD7FF; }
  .card { background: rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:28px; padding:36px 40px; margin-top:26px; box-shadow:0 12px 30px rgba(0,0,0,0.35);}  
  .card-title { display:flex; align-items:center; gap:18px; font-size:34px; font-weight:700; }
  .badge { width:54px; height:54px; border-radius:50%; background:#2EC5FF; display:inline-flex; align-items:center; justify-content:center; font-weight:800; color:#05151f; }
  ul { margin:18px 0 0 0; padding-left:26px; font-size:26px; line-height:1.5; color:#EDEDED; }
  .footer { font-size:22px; color:#B6B6B6; text-align:right; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="header">
      <div class="title">选择马自达 EZ-60 的十大理由</div>
      <div class="subtitle">安全与空间双重安心</div>
    </div>

    <div>
      <div class="card">
        <div class="card-title"><span class="badge">5</span>安全配置</div>
        <ul>
          <li>L2+ 级智能驾驶辅助</li>
          <li>360°全景影像</li>
          <li>自动泊车功能</li>
          <li>全方位安全守护</li>
        </ul>
      </div>

      <div class="card">
        <div class="card-title"><span class="badge">6</span>空间表现</div>
        <ul>
          <li>中大型 SUV 尺寸</li>
          <li>轴距 2900mm+</li>
          <li>后排宽敞舒适</li>
          <li>后备箱容积大</li>
        </ul>
      </div>
    </div>

    <div class="footer">#安全配置 #大空间SUV</div>
  </div>
</body>
</html>
