<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>马自达EZ-60 十大理由 01</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    width: 1080px;
    height: 1440px;
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    background: radial-gradient(1200px 900px at 80% 20%, rgba(255,70,70,0.18), transparent 60%),
                linear-gradient(160deg, #0b0f16 0%, #1b1115 55%, #0b0f16 100%);
    color: #F7F7F7;
  }
  .canvas {
    width: 100%;
    height: 100%;
    padding: 80px 80px 70px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .header .title {
    font-size: 52px;
    font-weight: 800;
    letter-spacing: 1px;
  }
  .header .subtitle {
    margin-top: 10px;
    font-size: 26px;
    color: #FF9AA0;
  }
  .card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 28px;
    padding: 36px 40px;
    margin-top: 26px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
  }
  .card-title {
    display: flex;
    align-items: center;
    gap: 18px;
    font-size: 34px;
    font-weight: 700;
  }
  .badge {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: #FF3B4E;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
  }
  ul {
    margin: 18px 0 0 0;
    padding-left: 26px;
    font-size: 26px;
    line-height: 1.5;
    color: #EDEDED;
  }
  .footer {
    font-size: 22px;
    color: #B6B6B6;
    text-align: right;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="header">
      <div class="title">选择马自达 EZ-60 的十大理由</div>
      <div class="subtitle">新能源 SUV 必看指南</div>
    </div>

    <div>
      <div class="card">
        <div class="card-title"><span class="badge">1</span>魂动设计 2.0</div>
        <ul>
          <li>全新纯电平台打造</li>
          <li>流畅轿跑 SUV 造型</li>
          <li>辨识度极高的前脸设计</li>
          <li>运动感与优雅并存</li>
        </ul>
      </div>

      <div class="card">
        <div class="card-title"><span class="badge">2</span>超长续航</div>
        <ul>
          <li>CLTC 续航 600km+</li>
          <li>800V 高压快充平台</li>
          <li>15 分钟充电 80%</li>
          <li>告别里程焦虑</li>
        </ul>
      </div>
    </div>

    <div class="footer">#马自达EZ60 #新能源SUV</div>
  </div>
</body>
</html>
