<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>马自达EZ-60 十大理由 02</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    width: 1080px;
    height: 1440px;
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    background: radial-gradient(1000px 900px at 20% 10%, rgba(255,140,0,0.18), transparent 60%),
                linear-gradient(155deg, #0b0f16 0%, #15212f 55%, #0b0f16 100%);
    color: #F7F7F7;
  }
  .canvas { width:100%; height:100%; padding:80px; display:flex; flex-direction:column; justify-content:space-between; }
  .header .title { font-size:52px; font-weight:800; letter-spacing:1px; }
  .header .subtitle { margin-top:10px; font-size:26px; color:#FFC36A; }
  .card { background: rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:28px; padding:36px 40px; margin-top:26px; box-shadow:0 12px 30px rgba(0,0,0,0.35);}  
  .card-title { display:flex; align-items:center; gap:18px; font-size:34px; font-weight:700; }
  .badge { width:54px; height:54px; border-radius:50%; background:#FF8A00; display:inline-flex; align-items:center; justify-content:center; font-weight:800; color:#1d1204; }
  ul { margin:18px 0 0 0; padding-left:26px; font-size:26px; line-height:1.5; color:#EDEDED; }
  .footer { font-size:22px; color:#B6B6B6; text-align:right; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="header">
      <div class="title">选择马自达 EZ-60 的十大理由</div>
      <div class="subtitle">智能与驾控的双重升级</div>
    </div>

    <div>
      <div class="card">
        <div class="card-title"><span class="badge">3</span>智能座舱</div>
        <ul>
          <li>高通骁龙 8295 芯片</li>
          <li>超大一体式中控屏</li>
          <li>AR-HUD 抬头显示</li>
          <li>语音交互响应快</li>
        </ul>
      </div>

      <div class="card">
        <div class="card-title"><span class="badge">4</span>驾控基因</div>
        <ul>
          <li>马自达百年调校功底</li>
          <li>GVC 矢量控制系统</li>
          <li>精准转向手感</li>
          <li>驾驶乐趣不减</li>
        </ul>
      </div>
    </div>

    <div class="footer">#驾驶乐趣 #智能座舱</div>
  </div>
</body>
</html>
