<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>马自达EZ-60 十大理由 04</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    width: 1080px;
    height: 1440px;
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    background: radial-gradient(1000px 900px at 20% 15%, rgba(170,0,255,0.18), transparent 60%),

  .header .subtitle { margin-top:10px; font-size:26px; color:#D6A6FF; }
  .card { background: rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:28px; padding:36px 40px; margin-top:26px; box-shadow:0 12px 30px rgba(0,0,0,0.35);}  
  .card-title { display:flex; align-items:center; gap:18px; font-size:34px; font-weight:700; }
  .badge { width:54px; height:54px; border-radius:50%; background:#B05CFF; display:inline-flex; align-items:center; justify-content:center; font-weight:800; color:#140018; }
  ul { margin:18px 0 0 0; padding-left:26px; font-size:26px; line-height:1.5; color:#EDEDED; }
  .footer { font-size:22px; color:#B6B6B6; text-align:right; }

</head>
<body>

      <div class="subtitle">豪华质感与性能兼得</div>
    </div>

        </ul>

          <li>双电机四驱版本</li>
